<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="名片通">
<meta name="theme-color" content="#2563eb">
<title>名片通訊錄</title>
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5.0.4/dist/tesseract.min.js"></script>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,'Noto Sans TC',sans-serif;background:#0f172a;color:#f1f5f9;min-height:100vh;padding-bottom:72px}
.app-header{background:#1e293b;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;border-bottom:1px solid #334155}
.app-header h1{font-size:17px;font-weight:700}
.header-right{display:flex;align-items:center;gap:8px}
.badge{background:#2563eb;color:#fff;border-radius:99px;padding:2px 10px;font-size:12px;font-weight:700}
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:#1e293b;border-top:1px solid #334155;display:flex;z-index:200}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px 4px;border:none;background:none;color:#64748b;font-size:10px;font-weight:600;cursor:pointer;gap:3px;transition:.15s}
.nav-btn .icon{font-size:20px}
.nav-btn.active{color:#2563eb}
.page{display:none;padding:14px 14px 8px}
.page.active{display:block}
.card{background:#1e293b;border:1px solid #334155;border-radius:14px;padding:14px;margin-bottom:12px}
.section-label{font-size:11px;color:#64748b;font-weight:700;text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
button{font-family:inherit;cursor:pointer;border:none;transition:opacity .15s}
button:active{opacity:.7}
.btn{border-radius:10px;padding:11px 16px;font-size:14px;font-weight:600}
.btn-primary{background:#2563eb;color:#fff}
.btn-secondary{background:#334155;color:#f1f5f9}
.btn-sm{padding:6px 12px;font-size:13px;border-radius:8px}
.btn-row{display:flex;gap:8px;margin-top:10px}
.btn-row .btn{flex:1}
.field{margin-bottom:10px}
.field label{display:block;font-size:11px;color:#64748b;font-weight:700;text-transform:uppercase;letter-spacing:.05em;margin-bottom:4px}
.field input,.field textarea,.field select{width:100%;font-size:14px;padding:9px 11px;border-radius:9px;border:1px solid #334155;background:#0f172a;color:#f1f5f9;font-family:inherit;appearance:none}
.field textarea{resize:vertical;min-height:60px}
.field input:focus,.field textarea:focus,.field select:focus{outline:none;border-color:#2563eb}
.status-tag{display:inline-block;padding:3px 10px;border-radius:99px;font-size:12px;font-weight:700}
.s-new{background:#1e3a5f;color:#60a5fa}
.s-contacted{background:#1a3a2a;color:#4ade80}
.s-quoting{background:#3b2a00;color:#fbbf24}
.s-closed{background:#1a2e1a;color:#86efac}
.s-cold{background:#2a1a1a;color:#94a3b8}
.contact-item{background:#1e293b;border:1px solid #334155;border-radius:14px;padding:14px;margin-bottom:10px;cursor:pointer;transition:border-color .15s}
.contact-item:active{border-color:#2563eb}
.contact-item .ci-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px}
.contact-item .ci-name{font-size:15px;font-weight:700}
.contact-item .ci-company{font-size:13px;color:#94a3b8;margin-bottom:6px}
.contact-item .ci-meta{display:flex;gap:6px;flex-wrap:wrap;align-items:center}
.date-chip{font-size:11px;color:#64748b}
.source-chip{font-size:11px;background:#1e293b;border:1px solid #334155;color:#94a3b8;padding:2px 8px;border-radius:99px}
.action-row{display:flex;gap:8px;margin:10px 0}
.action-btn{flex:1;background:#0f172a;border:1px solid #334155;border-radius:10px;padding:10px 8px;text-align:center;font-size:13px;color:#94a3b8;font-weight:600;cursor:pointer;text-decoration:none;display:block}
.action-btn:active{background:#1e293b}
.log-entry{background:#0f172a;border-radius:9px;padding:10px;margin-bottom:8px;border-left:3px solid #334155}
.log-date{font-size:11px;color:#64748b;margin-bottom:3px}
.log-text{font-size:14px}
.search-bar{display:flex;gap:8px;margin-bottom:12px}
.search-bar input{flex:1;background:#1e293b;border:1px solid #334155;border-radius:10px;padding:10px 14px;color:#f1f5f9;font-size:14px;font-family:inherit}
.search-bar input:focus{outline:none;border-color:#2563eb}
.filter-row{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;margin-bottom:12px;scrollbar-width:none}
.filter-row::-webkit-scrollbar{display:none}
.filter-chip{flex-shrink:0;padding:5px 14px;border-radius:99px;font-size:13px;font-weight:600;border:1px solid #334155;background:#1e293b;color:#94a3b8;cursor:pointer}
.filter-chip.active{background:#2563eb;border-color:#2563eb;color:#fff}
.dropzone{border:1.5px dashed #475569;border-radius:12px;padding:28px 16px;text-align:center;cursor:pointer}
.dropzone:active{border-color:#2563eb;background:#1e3a5f22}
.dropzone .dz-icon{font-size:40px;margin-bottom:8px}
.dropzone p{color:#94a3b8;font-size:14px}
.dropzone p span{color:#60a5fa;font-weight:600}
#preview{width:100%;border-radius:10px;margin-top:10px;display:none;max-height:200px;object-fit:contain;background:#0f172a}
input[type=file]{display:none}
.status-bar{display:none;align-items:center;gap:8px;padding:9px 12px;background:#0f172a;border-radius:9px;margin-top:10px;font-size:13px;color:#94a3b8}
.status-bar.show{display:flex}
.spin{animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.stat-card{background:#1e293b;border:1px solid #334155;border-radius:12px;padding:14px;text-align:center}
.stat-num{font-size:28px;font-weight:800;color:#2563eb}
.stat-label{font-size:12px;color:#64748b;margin-top:2px}
.bar-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.bar-label{font-size:13px;color:#94a3b8;width:60px;flex-shrink:0}
.bar-track{flex:1;background:#0f172a;border-radius:99px;height:8px;overflow:hidden}
.bar-fill{height:100%;border-radius:99px;background:#2563eb;transition:width .4s}
.bar-count{font-size:12px;color:#64748b;width:24px;text-align:right}
.overlay{display:none;position:fixed;inset:0;background:#00000088;z-index:300}
.overlay.show{display:block}
.drawer{position:fixed;left:0;right:0;bottom:0;background:#1e293b;border-radius:20px 20px 0 0;padding:20px 16px;z-index:400;max-height:92vh;overflow-y:auto;transform:translateY(100%);transition:transform .3s}
.drawer.show{transform:translateY(0)}
.drawer-handle{width:36px;height:4px;background:#334155;border-radius:99px;margin:0 auto 16px}
.drawer-title{font-size:17px;font-weight:700;margin-bottom:14px}
.dup-warning{background:#3b1f00;border:1px solid #92400e;border-radius:10px;padding:10px 12px;font-size:13px;color:#fbbf24;margin-bottom:10px;display:none}
.empty-state{text-align:center;padding:40px 16px;color:#475569}
.empty-state .ei{font-size:40px;margin-bottom:8px}
.toast{position:fixed;top:76px;left:50%;transform:translateX(-50%);background:#22c55e;color:#fff;padding:9px 20px;border-radius:99px;font-size:14px;font-weight:700;z-index:999;opacity:0;transition:opacity .25s;pointer-events:none;white-space:nowrap}
.toast.show{opacity:1}
.toast.err{background:#dc2626}
.remind-dot{width:8px;height:8px;background:#f59e0b;border-radius:50%;display:inline-block;margin-left:4px;vertical-align:middle}
</style>
</head>
<body>
<div class="app-header">
  <h1>📇 名片通訊錄</h1>
  <div class="header-right">
    <span class="badge" id="totalBadge">0 筆</span>
    <button class="btn btn-sm btn-secondary" onclick="openImport()" style="padding:5px 10px;font-size:12px">匯入</button>
  </div>
</div>
<nav class="bottom-nav">
  <button class="nav-btn active" id="nav-scan" onclick="goPage('scan')"><span class="icon">📷</span>掃描</button>
  <button class="nav-btn" id="nav-list" onclick="goPage('list')"><span class="icon">📋</span>名單</button>
  <button class="nav-btn" id="nav-add" onclick="openAddDrawer(null)"><span class="icon">➕</span>手動新��</button>
  <button class="nav-btn" id="nav-stats" onclick="goPage('stats')"><span class="icon">📊</span>統計</button>
</nav>
<div class="page active" id="page-scan">
  <div class="card">
    <div class="section-label">拍照 / 上傳名片</div>
    <div class="dropzone" onclick="document.getElementById('fi').click()">
      <div class="dz-icon">📸</div>
      <p><span>點擊拍照</span>或選擇圖片</p>
      <p style="font-size:12px;margin-top:4px;color:#64748b">支援 JPG、PNG，可一次多張</p>
    </div>
    <input type="file" id="fi" accept="image/*" capture="environment" onchange="onFileChange(this)">
    <img id="preview">
    <div class="field" style="margin-top:12px;display:none" id="sourceFieldScan">
      <label>來源場合（例：2026食品展）</label>
      <input type="text" id="scanSource" placeholder="選填，留空亦可">
    </div>
    <div class="btn-row" id="scanActionRow" style="display:none">
      <button class="btn btn-primary" id="scanBtn" onclick="doScan()">🔍 開始辨識</button>
      <button class="btn btn-secondary" onclick="resetScan()">重拍</button>
    </div>
    <div class="status-bar" id="statusBar"></div>
  </div>
  <div id="scanResults"></div>
</div>
<div class="page" id="page-list">
  <div class="search-bar">
    <input type="text" id="searchInput" placeholder="搜尋姓名、公司、電話…" oninput="renderList()">
  </div>
  <div class="filter-row" id="filterRow">
    <div class="filter-chip active" data-filter="all" onclick="setFilter('all',this)">全部</div>
    <div class="filter-chip" data-filter="new" onclick="setFilter('new',this)">待聯繫</div>
    <div class="filter-chip" data-filter="contacted" onclick="setFilter('contacted',this)">已聯繫</div>
    <div class="filter-chip" data-filter="quoting" onclick="setFilter('quoting',this)">報價中</div>
    <div class="filter-chip" data-filter="closed" onclick="setFilter('closed',this)">成交</div>
    <div class="filter-chip" data-filter="cold" onclick="setFilter('cold',this)">冷淡</div>
    <div class="filter-chip" data-filter="remind" onclick="setFilter('remind',this)">⏰ 今日提醒</div>
  </div>
  <div id="listContainer"></div>
  <div class="empty-state" id="listEmpty" style="display:none">
    <div class="ei">📭</div>
    <div>沒有符合的聯絡人</div>
  </div>
  <div style="margin-top:4px;display:flex;gap:8px">
    <button class="btn btn-secondary" style="flex:1" onclick="exportCSV()">📥 匯出 CSV</button>
  </div>
</div>
<div class="page" id="page-stats">
  <div class="stat-grid" id="statGrid"></div>
  <div class="card">
    <div class="section-label">跟進狀態分佈</div>
    <div id="statusBars"></div>
  </div>
  <div class="card">
    <div class="section-label">來源場合分佈</div>
    <div id="sourceBars"></div>
  </div>
  <div class="card">
    <div class="section-label">⏰ 今日需跟進</div>
    <div id="todayRemind"></div>
  </div>
</div>
<div class="overlay" id="overlay" onclick="closeAllDrawers()"></div>
<div class="drawer" id="detailDrawer">
  <div class="drawer-handle"></div>
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
    <div class="drawer-title" id="detailTitle">聯絡人詳情</div>
    <button class="btn btn-sm btn-danger" onclick="deleteCurrentContact()">刪除</button>
  </div>
  <div id="detailBody"></div>
</div>
<div class="drawer" id="addDrawer">
  <div class="drawer-handle"></div>
  <div class="drawer-title" id="addDrawerTitle">手動新增聯絡人</div>
  <div class="dup-warning" id="dupWarning">⚠️ 偵測到相似聯絡人，請確認是否重複</div>
  <div class="field"><label>公司名稱 *</label><input id="f_company" oninput="checkDup()"></div>
  <div class="field"><label>客戶姓名 *</label><input id="f_name" oninput="checkDup()"></div>
  <div class="field"><label>電話</label><input id="f_phone" type="tel"></div>
  <div class="field"><label>Email</label><input id="f_email" type="email"></div>
  <div class="field"><label>備註（職稱、地址…）</label><textarea id="f_note"></textarea></div>
  <div class="field"><label>來源場合</label><input id="f_source" placeholder="例：2026台北食品展"></div>
  <div class="field"><label>跟進狀態</label>
    <select id="f_status">
      <option value="new">待聯繫</option>
      <option value="contacted">已聯繫</option>
      <option value="quoting">報價中</option>
      <option value="closed">成交</option>
      <option value="cold">冷淡</option>
    </select>
  </div>
  <div class="field"><label>⏰ 跟進提醒日期</label><input id="f_remind" type="date"></div>
  <input type="hidden" id="f_id">
  <div class="btn-row">
    <button class="btn btn-primary" onclick="saveContact()">儲存</button>
    <button class="btn btn-secondary" onclick="closeAllDrawers()">取消</button>
  </div>
</div>
<div class="drawer" id="importDrawer">
  <div class="drawer-handle"></div>
  <div class="drawer-title">匯入 CSV</div>
  <p style="font-size:13px;color:#94a3b8;margin-bottom:14px">CSV 欄位順序：公司名稱、客戶姓名、電話、Email、備註（第一行為標題會自動略過）</p>
  <div class="field"><label>選擇 CSV 檔案</label><input type="file" id="importFile" accept=".csv" style="display:block;background:#0f172a;border:1px solid #334155;border-radius:9px;padding:9px;color:#f1f5f9;width:100%"></div>
  <div class="field"><label>來源場合（選填）</label><input id="importSource" placeholder="例：2026台北食品展"></div>
  <div class="btn-row">
    <button class="btn btn-primary" onclick="doImport()">匯入</button>
    <button class="btn btn-secondary" onclick="closeAllDrawers()">取消</button>
  </div>
</div>
<div class="toast" id="toast"></div>
<script>
let contacts = JSON.parse(localStorage.getItem('cardbook_v2') || '[]');
let currentFilter = 'all';
let currentContactId = null;
let currentImage = null;
const STATUS_LABELS = { new:'待聯繫', contacted:'已聯繫', quoting:'報價中', closed:'成交', cold:'冷淡' };
const STATUS_CLASS  = { new:'s-new', contacted:'s-contacted', quoting:'s-quoting', closed:'s-closed', cold:'s-cold' };
function save() { localStorage.setItem('cardbook_v2', JSON.stringify(contacts)); updateBadge(); }
function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2,7); }
function today() { return new Date().toISOString().slice(0,10); }
function formatDate(d) { return d ? d.replace(/-/g,'/') : ''; }
function updateBadge() { document.getElementById('totalBadge').textContent = contacts.length + ' 筆'; }
function showToast(msg, err) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (err ? ' err' : '');
  clearTimeout(t._t);
  t._t = setTimeout(() => t.className = 'toast', 2200);
}
function goPage(name) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-'+name).classList.add('active');
  document.getElementById('nav-'+name).classList.add('active');
  if (name === 'list') renderList();
  if (name === 'stats') renderStats();
}
function openDrawer(id) {
  document.getElementById(id).classList.add('show');
  document.getElementById('overlay').classList.add('show');
  document.body.style.overflow = 'hidden';
}
function closeAllDrawers() {
  document.querySelectorAll('.drawer').forEach(d => d.classList.remove('show'));
  document.getElementById('overlay').classList.remove('show');
  document.body.style.overflow = '';
}
function onFileChange(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = () => {
    currentImage = reader.result;
    document.getElementById('preview').src = reader.result;
    document.getElementById('preview').style.display = 'block';
    document.getElementById('scanActionRow').style.display = 'flex';
    document.getElementById('sourceFieldScan').style.display = 'block';
  };
  reader.readAsDataURL(file);
}
function resetScan() {
  currentImage = null;
  document.getElementById('preview').style.display = 'none';
  document.getElementById('scanActionRow').style.display = 'none';
  document.getElementById('sourceFieldScan').style.display = 'none';
  document.getElementById('fi').value = '';
}
function setStatus(msg, spinning) {
  const el = document.getElementById('statusBar');
  el.className = 'status-bar show';
  el.innerHTML = (spinning ? '<span class="spin">⏳</span> ' : '✅ ') + msg;
}
async function doScan() {
  if (!currentImage) return;
  const btn = document.getElementById('scanBtn');
  btn.disabled = true;
  setStatus('OCR 辨識中，請稍候…', true);
  try {
    const { data: { text } } = await Tesseract.recognize(currentImage, 'chi_tra+eng');
    const extracted = parseBusinessCardText(text);
    const source = document.getElementById('scanSource').value.trim();
    const newOnes = extracted.map(c => ({
      id: uid(), company: c.company||'', name: c.name||'',
      phone: c.phone||'', email: c.email||'', note: c.note||'',
      source: source, status: 'new', logs: [],
      remind: '', createdAt: today()
    }));
    contacts = [...contacts, ...newOnes];
    save();
    setStatus(`辨識完成，新增 ${newOnes.length} 筆`, false);
    renderScanResults(newOnes);
  } catch(err) {
    console.error(err);
    setStatus('辨識失敗，請重試', false);
  } finally {
    btn.disabled = false;
  }
}
function parseBusinessCardText(text) {
  const cards = [];
  const lines = text.split('\n').filter(l => l.trim());
  let currentCard = { company: '', name: '', phone: '', email: '', note: '' };
  lines.forEach(line => {
    line = line.trim();
    if (!line) return;
    if (line.includes('@')) {
      currentCard.email = line;
    } else if (/\d{2,}[-]?\d{3,}[-]?\d{3,}/.test(line) || /09\d{8}/.test(line)) {
      currentCard.phone = (currentCard.phone ? currentCard.phone + ' / ' : '') + line;
    } else {
      if (!currentCard.company) {
        currentCard.company = line;
      } else if (!currentCard.name) {
        currentCard.name = line;
      } else {
        currentCard.note = (currentCard.note ? currentCard.note + ' ' : '') + line;
      }
    }
  });
  if (currentCard.company || currentCard.name) {
    cards.push(currentCard);
  }
  return cards.length ? cards : [{ company: '', name: '', phone: '', email: '', note: '（辨識未果，請手動編輯）' }];
}
function renderScanResults(list) {
  if (!list.length) return;
  document.getElementById('scanResults').innerHTML = '<div class="section-label" style="margin-bottom:8px">辨識結果（點入可編輯）</div>' + list.map(c => contactItem(c)).join('');
}
function setFilter(val, el) {
  currentFilter = val;
  document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
  el.classList.add('active');
  renderList();
}
function renderList() {
  const q = (document.getElementById('searchInput').value || '').toLowerCase();
  const tod = today();
  let list = contacts.filter(c => {
    if (q && !`${c.company}${c.name}${c.phone}${c.email}${c.note}${c.source}`.toLowerCase().includes(q)) return false;
    if (currentFilter === 'all') return true;
    if (currentFilter === 'remind') return c.remind && c.remind <= tod;
    return c.status === currentFilter;
  });
  list = [...list].reverse();
  const container = document.getElementById('listContainer');
  const empty = document.getElementById('listEmpty');
  if (!list.length) { container.innerHTML = ''; empty.style.display = ''; return; }
  empty.style.display = 'none';
  container.innerHTML = list.map(c => contactItem(c)).join('');
}
function contactItem(c) {
  const isRemind = c.remind && c.remind <= today();
  return `<div class="contact-item" onclick="openDetail('${c.id}')">
    <div class="ci-top">
      <div class="ci-name">${esc(c.name)||'（未知姓名）'}${isRemind?'<span class="remind-dot"></span>':''}</div>
      <span class="status-tag ${STATUS_CLASS[c.status]||'s-new'}">${STATUS_LABELS[c.status]||'待聯繫'}</span>
    </div>
    <div class="ci-company">${esc(c.company)}</div>
    <div class="ci-meta">
      ${c.phone?`<span style="font-size:12px;color:#60a5fa">📞 ${esc(c.phone.split('/')[0].trim())}</span>`:''}
      ${c.source?`<span class="source-chip">📍 ${esc(c.source)}</span>`:''}
      <span class="date-chip">${formatDate(c.createdAt)}</span>
    </div>
  </div>`;
}
function openDetail(id) {
  currentContactId = id;
  const c = contacts.find(x => x.id === id);
  if (!c) return;
  document.getElementById('detailTitle').textContent = c.name || c.company || '聯絡人詳情';
  const phoneLink = c.phone ? `<a href="tel:${c.phone.replace(/[^+\d]/g,'')}" class="action-btn">📞 撥號</a>` : `<span class="action-btn" style="opacity:.3">📞 撥號</span>`;
  const emailLink = c.email ? `<a href="mailto:${c.email}" class="action-btn">✉️ 寄信</a>` : `<span class="action-btn" style="opacity:.3">✉️ 寄信</span>`;
  const logs = (c.logs||[]).slice().reverse().map(l => `<div class="log-entry"><div class="log-date">${formatDate(l.date)}</div><div class="log-text">${esc(l.text)}</div></div>`).join('') || '<div style="color:#475569;font-size:13px">尚無記錄</div>';
  document.getElementById('detailBody').innerHTML = `<div class="card" style="margin-bottom:10px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
      <span class="status-tag ${STATUS_CLASS[c.status]||'s-new'}">${STATUS_LABELS[c.status]||'待聯繫'}</span>
      ${c.remind?`<span style="font-size:12px;color:#f59e0b">⏰ 提醒 ${formatDate(c.remind)}</span>`:''}
    </div>
    ${c.company?`<div style="font-size:15px;font-weight:700;margin-bottom:4px">${esc(c.company)}</div>`:''}
    ${c.note?`<div style="font-size:13px;color:#94a3b8">${esc(c.note)}</div>`:''}
    ${c.source?`<div style="font-size:12px;color:#64748b;margin-top:6px">📍 ${esc(c.source)}</div>`:''}
    ${c.phone?`<div style="font-size:13px;margin-top:8px">📞 ${esc(c.phone)}</div>`:''}
    ${c.email?`<div style="font-size:13px">✉️ ${esc(c.email)}</div>`:''}
  </div>
  <div class="action-row">${phoneLink}${emailLink}<span class="action-btn" onclick="openAddDrawer('${id}')">✏️ 編輯</span></div>
  <div class="card">
    <div class="section-label">跟進記錄</div>
    ${logs}
    <div style="display:flex;gap:8px;margin-top:10px">
      <input id="logInput" style="flex:1;background:#0f172a;border:1px solid #334155;border-radius:9px;padding:8px 10px;color:#f1f5f9;font-size:14px;font-family:inherit" placeholder="記錄本次聯繫內容…">
      <button class="btn btn-primary btn-sm" onclick="addLog('${id}')">新增</button>
    </div>
  </div>
  <div class="card">
    <div class="section-label">變更跟進狀態</div>
    <div style="display:flex;gap:6px;flex-wrap:wrap">
      ${Object.entries(STATUS_LABELS).map(([k,v]) => `<button class="btn btn-sm ${c.status===k?'btn-primary':'btn-secondary'}" onclick="changeStatus('${id}','${k}')">${v}</button>`).join('')}
    </div>
  </div>`;
  openDrawer('detailDrawer');
}
function changeStatus(id, status) {
  const c = contacts.find(x => x.id === id);
  if (c) { c.status = status; save(); openDetail(id); }
}
function addLog(id) {
  const input = document.getElementById('logInput');
  const text = input.value.trim();
  if (!text) return;
  const c = contacts.find(x => x.id === id);
  if (!c) return;
  if (!c.logs) c.logs = [];
  c.logs.push({ date: today(), text });
  save();
  input.value = '';
  openDetail(id);
  showToast('記錄已新增');
}
function deleteCurrentContact() {
  if (!currentContactId) return;
  const c = contacts.find(x => x.id === currentContactId);
  if (!confirm(`確定刪除「${c?.name||c?.company||'此聯絡人'}」？`)) return;
  contacts = contacts.filter(x => x.id !== currentContactId);
  save(); closeAllDrawers(); renderList(); renderStats();
  showToast('已刪除');
}
function openAddDrawer(id) {
  const c = id ? contacts.find(x => x.id === id) : null;
  document.getElementById('addDrawerTitle').textContent = c ? '編輯聯絡人' : '手動新增聯絡人';
  document.getElementById('f_id').value = c ? c.id : '';
  document.getElementById('f_company').value = c ? c.company : '';
  document.getElementById('f_name').value = c ? c.name : '';
  document.getElementById('f_phone').value = c ? c.phone : '';
  document.getElementById('f_email').value = c ? c.email : '';
  document.getElementById('f_note').value = c ? c.note : '';
  document.getElementById('f_source').value = c ? c.source : '';
  document.getElementById('f_status').value = c ? c.status : 'new';
  document.getElementById('f_remind').value = c ? c.remind : '';
  document.getElementById('dupWarning').style.display = 'none';
  closeAllDrawers();
  setTimeout(() => openDrawer('addDrawer'), 50);
}
function checkDup() {
  const name = document.getElementById('f_name').value.trim();
  const company = document.getElementById('f_company').value.trim();
  const editId = document.getElementById('f_id').value;
  const dup = contacts.some(c => c.id !== editId && ((name && c.name === name) || (company && c.company === company && name && c.name === name)));
  document.getElementById('dupWarning').style.display = dup ? 'block' : 'none';
}
function saveContact() {
  const company = document.getElementById('f_company').value.trim();
  const name = document.getElementById('f_name').value.trim();
  if (!company && !name) { showToast('請填入公司或姓名', true); return; }
  const editId = document.getElementById('f_id').value;
  if (editId) {
    const c = contacts.find(x => x.id === editId);
    if (c) {
      c.company = company; c.name = name;
      c.phone = document.getElementById('f_phone').value.trim();
      c.email = document.getElementById('f_email').value.trim();
      c.note = document.getElementById('f_note').value.trim();
      c.source = document.getElementById('f_source').value.trim();
      c.status = document.getElementById('f_status').value;
      c.remind = document.getElementById('f_remind').value;
    }
    showToast('已更新');
  } else {
    contacts.push({
      id: uid(), company, name,
      phone: document.getElementById('f_phone').value.trim(),
      email: document.getElementById('f_email').value.trim(),
      note: document.getElementById('f_note').value.trim(),
      source: document.getElementById('f_source').value.trim(),
      status: document.getElementById('f_status').value,
      remind: document.getElementById('f_remind').value,
      logs: [], createdAt: today()
    });
    showToast('已新增');
  }
  save(); closeAllDrawers(); renderList(); updateBadge();
}
function renderStats() {
  const n = contacts.length;
  const tod = today();
  const remind = contacts.filter(c => c.remind && c.remind <= tod).length;
  const closed = contacts.filter(c => c.status === 'closed').length;
  const sources = {};
  contacts.forEach(c => { const s = c.source||'未標記'; sources[s] = (sources[s]||0)+1; });
  const statusCount = {};
  Object.keys(STATUS_LABELS).forEach(k => statusCount[k] = contacts.filter(c => c.status === k).length);
  document.getElementById('statGrid').innerHTML = `
    <div class="stat-card"><div class="stat-num">${n}</div><div class="stat-label">總聯絡人</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#f59e0b">${remind}</div><div class="stat-label">今日待跟進</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#4ade80">${closed}</div><div class="stat-label">成交數</div></div>
    <div class="stat-card"><div class="stat-num" style="color:#f87171">${statusCount.new||0}</div><div class="stat-label">待聯繫</div></div>
  `;
  const maxS = Math.max(...Object.values(statusCount), 1);
  document.getElementById('statusBars').innerHTML = Object.entries(STATUS_LABELS).map(([k,v]) =>
    `<div class="bar-row"><div class="bar-label">${v}</div><div class="bar-track"><div class="bar-fill" style="width:${(statusCount[k]||0)/maxS*100}%"></div></div><div class="bar-count">${statusCount[k]||0}</div></div>`
  ).join('');
  const sortedSrc = Object.entries(sources).sort((a,b)=>b[1]-a[1]);
  const maxSrc = Math.max(...sortedSrc.map(x=>x[1]), 1);
  document.getElementById('sourceBars').innerHTML = sortedSrc.map(([k,v]) =>
    `<div class="bar-row"><div class="bar-label" style="width:80px;font-size:11px">${esc(k.slice(0,6))}</div><div class="bar-track"><div class="bar-fill" style="width:${v/maxSrc*100}%"></div></div><div class="bar-count">${v}</div></div>`
  ).join('');
  const todayList = contacts.filter(c => c.remind && c.remind <= tod);
  document.getElementById('todayRemind').innerHTML = todayList.length ? todayList.map(c => `<div onclick="openDetail('${c.id}')" style="padding:8px 0;border-bottom:1px solid #334155;cursor:pointer"><span style="font-weight:700">${esc(c.name)}</span><span style="color:#94a3b8;font-size:13px"> ${esc(c.company)}</span><span style="color:#f59e0b;font-size:12px;float:right">${formatDate(c.remind)}</span></div>`).join('') : '<div style="color:#475569;font-size:13px">今日無待跟進聯絡人 🎉</div>';
}
function exportCSV() {
  if (!contacts.length) { showToast('沒有資料可匯出', true); return; }
  const headers = ['公司名稱','客戶姓名','電話','Email','備註','來源場合','跟進狀態','提醒日期','建立日期'];
  let csv = '\uFEFF' + headers.join(',') + '\n';
  contacts.forEach(c => {
    csv += [c.company,c.name,c.phone,c.email,c.note,c.source,STATUS_LABELS[c.status]||'',c.remind,c.createdAt]
      .map(v=>`"${String(v||'').replace(/"/g,'""')}"`)
      .join(',') + '\n';
  });
  const blob = new Blob([csv],{type:'text/csv;charset=utf-8;'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href=url; a.download='名片聯絡人清單.csv'; a.click();
  URL.revokeObjectURL(url);
  showToast('CSV 已匯出 ✅');
}
function openImport() { openDrawer('importDrawer'); }
function doImport() {
  const file = document.getElementById('importFile').files[0];
  const source = document.getElementById('importSource').value.trim();
  if (!file) { showToast('請選擇 CSV 檔案', true); return; }
  const reader = new FileReader();
  reader.onload = e => {
    const lines = e.target.result.split('\n').filter(l=>l.trim());
    let added = 0;
    lines.forEach((line, i) => {
      if (i === 0) return;
      const cols = line.split(',').map(s=>s.replace(/^"|"$/g,'').replace(/""/g,'"').trim());
      if (!cols[0] && !cols[1]) return;
      contacts.push({
        id: uid(), company: cols[0]||'', name: cols[1]||'',
        phone: cols[2]||'', email: cols[3]||'', note: cols[4]||'',
        source: source || cols[5]||'', status: 'new', logs: [],
        remind: '', createdAt: today()
      });
      added++;
    });
    save(); closeAllDrawers(); renderList();
    showToast(`已匯入 ${added} 筆`);
  };
  reader.readAsText(file, 'UTF-8');
}
function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}
if ('serviceWorker' in navigator) navigator.serviceWorker.register('./sw.js').catch(()=>{});
updateBadge();
</script>
</body>
</html>
